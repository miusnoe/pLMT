name: LaTeX-Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git Repository
        uses: actions/checkout@v4 # Update auf v4

      - name: Compile LaTeX Document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: pLMT-Mitschriften_2025.tex 

      - name: Upload PDF
        uses: actions/upload-artifact@v4 # Update auf v4
        with:
          name: pLMT Mitschrit 2025
          path: pLMT-Mitschriften_2025.pdf